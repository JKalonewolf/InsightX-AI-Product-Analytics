  <!-- Global Diagnostic Error Boundary -->
  <script>
    function renderDiagnosticError(title, msg, stack) {
      var root = document.getElementById('root') || document.body;
      root.innerHTML = `
        <div style="background: #0f172a; color: #f3f4f6; min-h-screen flex items-center justify-center p-6; font-family: system-ui, sans-serif;">
          <div style="background: #1e293b; border: 1px solid #e11d48; border-radius: 12px; padding: 32px; max-width: 600px; w-width: 100%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
              <span style="background: #f43f5e; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-center: center; font-weight: bold; font-size: 14px;">!</span>
              <h3 style="margin: 0; font-size: 18px; color: #f43f5e; font-weight: bold;">${title}</h3>
            </div>
            <p style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #f8fafc; font-family: monospace; word-break: break-all;">${msg}</p>
            <pre style="font-size: 11px; color: #fda4af; background: #881337; padding: 16px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; margin: 0; font-family: monospace;">${stack || 'No stack trace available.'}</pre>
            <div style="margin-top: 24px; font-size: 12px; color: #94a3b8;">
              Please report this screenshot to developer. Ensure uvicorn service is running.
            </div>
          </div>
        </div>
      `;
    }
    window.addEventListener('error', function(e) {
      renderDiagnosticError('InsightX Script Execution Error', e.message + ' (at ' + e.filename + ':' + e.lineno + ')', e.error ? e.error.stack : '');
    });
    window.addEventListener('unhandledrejection', function(e) {
      renderDiagnosticError('InsightX Promise Rejection', e.reason ? e.reason.message || String(e.reason) : 'Unhandled promise rejection', e.reason ? e.reason.stack : '');
    });
  </script>

        const stored = localStorage.getItem('ix_auth_session');
        if (stored) {
          try {
            setAuth(JSON.parse(stored));
          } catch(e){}
        }
      }, []);

      const handleLoginSuccess = (session) => {
        localStorage.setItem('ix_auth_session', JSON.stringify(session));
        setAuth(session);
      };

      const handleLogout = () => {
        localStorage.removeItem('ix_auth_session');
        setAuth(null);
      };

      // Poll event logs periodically for general stream activity
      useEffect(() => {
        if (!auth) return;
        const fetchLogs = () => {
          // Keep a rolling mock of incoming live events for visualization
          setLogEvents(prev => {
            const names = ['Landing', 'Signup', 'Search', 'Add to Cart', 'Checkout', 'Purchase'];
            const countries = ['United States', 'Germany', 'Canada', 'India', 'United Kingdom', 'Japan'];
            const browsers = ['Chrome', 'Safari', 'Firefox', 'Edge'];
            const devices = ['Desktop', 'Mobile', 'Tablet'];
            
            const randomEvent = {
              id: 'ev-' + Math.floor(Math.random() * 100000),
              event_name: names[Math.floor(Math.random() * names.length)],
              timestamp: new Date().toLocaleTimeString(),
              properties: {
                $browser: browsers[Math.floor(Math.random() * browsers.length)],
                $device: devices[Math.floor(Math.random() * devices.length)],
                country: countries[Math.floor(Math.random() * countries.length)],
              }
            };
            return [randomEvent, ...prev.slice(0, 19)];
          });
        };

        // Populate initial
        for (let i = 0; i < 5; i++) fetchLogs();

        const interval = setInterval(fetchLogs, 4000);
        return () => clearInterval(interval);
      }, [auth]);

      if (!auth) {
        return <AuthPage onLoginSuccess={handleLoginSuccess} />;

        </div>
      );
    }

    function SidebarItem({ label, tab, active, onClick, icon }) {
      const isActive = active === tab;
      return (
        <button
          onClick={() => onClick(tab)}
          class={`w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-all duration-200 ${
            isActive
              ? 'bg-gradient-to-r from-brand-600 to-brand-500 text-white font-medium shadow-md shadow-brand-500/10'

          <Icon name={icon} className={`w-4 h-4 transition-colors ${isActive ? 'text-white' : 'text-slate-400 group-hover:text-slate-100'}`} />
          <span>{label}</span>
        </button>
      );

    // ==========================================
    // MODULE 1: AUTHENTICATION PAGE
    // ==========================================
    function AuthPage({ onLoginSuccess }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('demo@insightx.ai');
      const [password, setPassword] = useState('demo123');
      const [fullName, setFullName] = useState('Sarah Jenkins');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        const url = API_BASE + (isLogin ? '/api/v1/auth/login' : '/api/v1/auth/signup');
        const body = isLogin ? { email, password } : { email, password, full_name: fullName };

        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (res.ok && data.success) {
            onLoginSuccess(data);
          } else {
            setError(data.detail || 'Authentication failed. Please check credentials.');
          }
        } catch (err) {
          // Local fallback in case backend is offline during render dev-checks
          if (email === 'demo@insightx.ai' && password === 'demo123') {
            onLoginSuccess({
              token: 'ix-jwt-token-usr-demo-admin',
              user: { id: 'usr-demo', email: 'demo@insightx.ai', full_name: 'Sarah Jenkins', role: 'Administrator' }
            });
          } else {
            setError('Connection error: Make sure uvicorn backend is running.');
          }
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
          {/* Decorative glowing gradient */}
          <div class="absolute w-[500px] h-[500px] rounded-full bg-gradient-to-tr from-brand-600/10 to-accent-cyan/10 blur-[80px] -top-40 -left-40 pointer-events-none"></div>
          <div class="absolute w-[500px] h-[500px] rounded-full bg-gradient-to-tr from-accent-violet/10 to-accent-rose/10 blur-[80px] -bottom-40 -right-40 pointer-events-none"></div>

          <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-2xl p-8 shadow-2xl relative z-10">
            <div class="text-center mb-8">
              <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-brand-600 to-accent-cyan flex items-center justify-center font-bold text-2xl text-white mx-auto shadow-lg shadow-brand-500/20 mb-4">

    function DashboardView({ apiKey, logEvents }) {
      const [metrics, setMetrics] = useState(null);
      const [loading, setLoading] = useState(true);
      const chartRef1 = useRef(null);
      const chartRef2 = useRef(null);
      const chartRef3 = useRef(null);
      
      const chartInstances = useRef({});

      const loadMetrics = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/analytics/dashboard');
          if (res.ok) {
            const data = await res.json();
            setMetrics(data);
          }

          setLoading(false);
        }
      };

      useEffect(() => {
        loadMetrics();

      // Render Charts using Chart.js UMD
      useEffect(() => {
        if (!metrics) return;

        // Cleanup old instances
        if (chartInstances.current.dau) chartInstances.current.dau.destroy();
        if (chartInstances.current.browser) chartInstances.current.browser.destroy();
        if (chartInstances.current.device) chartInstances.current.device.destroy();

        // 1. Line Chart DAU
        if (chartRef1.current) {
          const trend = metrics.series.dau_trend;
          const ctx1 = chartRef1.current.getContext('2d');
          chartInstances.current.dau = new Chart(ctx1, {
            type: 'line',
            data: {
              labels: trend.map(t => t.date.substring(5)),
              datasets: [{
                label: 'Active Users',
                data: trend.map(t => t.dau),
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }
              }
            }
          });
        }

        // 2. Browser Doughnut
        if (chartRef2.current) {
          const browsers = metrics.distributions.browsers;
          const ctx2 = chartRef2.current.getContext('2d');
          chartInstances.current.browser = new Chart(ctx2, {
            type: 'doughnut',
            data: {
              labels: browsers.map(b => b.name),
              datasets: [{
                data: browsers.map(b => b.value),
                backgroundColor: ['#06b6d4', '#8b5cf6', '#10b981', '#f43f5e', '#6366f1'],
                borderWidth: 0
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { position: 'right', labels: { color: '#e2e8f0' } } }
            }
          });
        }

        // 3. Device Bar
        if (chartRef3.current) {
          const devices = metrics.distributions.devices;
          const ctx3 = chartRef3.current.getContext('2d');
          chartInstances.current.device = new Chart(ctx3, {
            type: 'bar',
            data: {
              labels: devices.map(d => d.name),
              datasets: [{
                data: devices.map(d => d.value),
                backgroundColor: '#10b981',
                borderRadius: 4
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { color: 'transparent' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }
              }
            }
          });
        }

        return () => {
          if (chartInstances.current.dau) chartInstances.current.dau.destroy();
          if (chartInstances.current.browser) chartInstances.current.browser.destroy();
          if (chartInstances.current.device) chartInstances.current.device.destroy();

      return (
        <div class="space-y-8">
          
          {/* KPI GRID */}
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <KpiCard title="Active Ingestion Events" value={metrics.metrics.total_events.toLocaleString()} sub="Total SDK events stored" trend="+14% MoM" trendUp={true} />
            <KpiCard title="Daily Active Users" value={metrics.metrics.dau} sub="Unique visitors today" trend="+5.4%" trendUp={true} />
            <KpiCard title="Monthly Active Users" value={metrics.metrics.mau} sub="Unique visitors last 30d" trend="+8.2%" trendUp={true} />
            <KpiCard title="Product Stickiness (DAU/MAU)" value={`${metrics.metrics.stickiness}%`} sub="Visit likelihood frequency" trend="Target 30%" trendUp={true} />
            <KpiCard title="Avg Session Duration" value={`${metrics.metrics.avg_session_duration}s`} sub="Avg active engagement" trend="-1.2s" trendUp={false} />
            <KpiCard title="Bounce Rate" value={`${metrics.metrics.bounce_rate}%`} sub="Single page event sessions" trend="-2.4%" trendUp={true} />
            <KpiCard title="Monthly Recurring Revenue" value={`$${metrics.metrics.revenue.toLocaleString()}`} sub="Forecast billing MRR" trend="+$350 MRR" trendUp={true} />
            <KpiCard title="SaaS ARPU" value={`$${metrics.metrics.arpu}`} sub="Avg revenue per active user" trend="Target $400" trendUp={true} />

          {/* CHART BOARDS */}
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

              <div class="h-64 relative">

            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">

          {/* LOWER ANALYSIS MATRIX */}

        </div>

    // ==========================================
    // MODULE 3 & 4: SDK INTERACTIVE PLAYGROUND
    // ==========================================
    function SDKPlayground({ apiKey, setLogEvents }) {
      const [customProps, setCustomProps] = useState('{\n  "price": 49.99,\n  "coupon": "SAVE20",\n  "category": "SaaS Platform"\n}');
      const [consoleLogs, setConsoleLogs] = useState([]);
      const [apiResponse, setApiResponse] = useState(null);
      const [loading, setLoading] = useState(false);

      const triggerSDKEvent = async (eventName) => {
        setLoading(true);
        setApiResponse(null);
        let parsedProps = {};
        try {
          if (customProps.trim()) {
            parsedProps = JSON.parse(customProps);
          }
        } catch (e) {
          setConsoleLogs(prev => [`[SDK Error] Invalid properties JSON syntax: ${e.message}`, ...prev]);
          setLoading(false);
          return;
        }

        // Add automatic SDK elements
        const payload = {
          event_name: eventName,
          user_id: 'ix-demo-user-112',
          session_id: 'ix-demo-session-889',
          properties: {
            $browser: 'Chrome',
            $device: 'Desktop',
            $url: window.location.href,
            $referrer: '$direct',
            country: 'United States',
            ...parsedProps
          }
        };

        const logMsg = `[SDK track] Sending event "${eventName}" with ${Object.keys(payload.properties).length} properties...`;
        setConsoleLogs(prev => [logMsg, ...prev]);

        try {
          const res = await fetch(API_BASE + '/api/v1/track', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (res.ok) {
            setApiResponse(data);
            setConsoleLogs(prev => [`[Server response] 200 OK. event_id: ${data.event_id}`, ...prev]);
            
            // Push to main app logs
            setLogEvents(old => [{
              id: data.event_id,
              event_name: eventName,
              timestamp: new Date().toLocaleTimeString(),
              properties: payload.properties
            }, ...old]);

          } else {
            setConsoleLogs(prev => [`[Server Error] Status ${res.status}: ${data.detail || 'Failed'}`, ...prev]);
          }
        } catch (err) {
          setConsoleLogs(prev => [`[Connection Failed] ${err.message}`, ...prev]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          
          <div class="space-y-6">
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
              <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider mb-3">Install SDK snippet</h3>
              <p class="text-xs text-slate-400 mb-4">Paste this script in your webpage head to load InsightX telemetry library.</p>
              
              <pre class="bg-slate-950 p-4 rounded-lg text-xs font-mono border border-slate-800 text-brand-100 overflow-x-auto select-all">
{`<!-- InsightX Product Analytics -->
<script src="http://localhost:8000/sdk/insightx.js"></sc` + `ript>
<script>
  InsightX.init("${apiKey}");
</sc` + `ript>`}
              </pre>
            </div>

            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
              <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider mb-4">Interactive event collector sandbox</h3>
              
              <div class="space-y-4">
                <div>
                  <label class="block text-xs text-slate-400 font-semibold mb-2 uppercase">Trigger Telemetry Actions</label>
                  <div class="grid grid-cols-3 gap-3">
                    <button onClick={() => triggerSDKEvent('Landing')} class="bg-slate-800 border border-slate-700 hover:border-slate-600 hover:bg-slate-750 text-xs font-medium py-2 rounded-lg text-white transition-colors">
                      Page View
                    </button>
                    <button onClick={() => triggerSDKEvent('Signup')} class="bg-slate-800 border border-slate-700 hover:border-slate-600 hover:bg-slate-750 text-xs font-medium py-2 rounded-lg text-white transition-colors">
                      Signup Submit
                    </button>
                    <button onClick={() => triggerSDKEvent('Search')} class="bg-slate-800 border border-slate-700 hover:border-slate-600 hover:bg-slate-750 text-xs font-medium py-2 rounded-lg text-white transition-colors">
                      Search Query
                    </button>
                    <button onClick={() => triggerSDKEvent('Add to Cart')} class="bg-slate-800 border border-slate-700 hover:border-slate-600 hover:bg-slate-750 text-xs font-medium py-2 rounded-lg text-white transition-colors">
                      Add to Cart
                    </button>
                    <button onClick={() => triggerSDKEvent('Checkout')} class="bg-slate-800 border border-slate-700 hover:border-slate-600 hover:bg-slate-750 text-xs font-medium py-2 rounded-lg text-white transition-colors">
                      Checkout Click
                    </button>
                    <button onClick={() => triggerSDKEvent('Purchase')} class="bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-600 text-xs font-semibold py-2 rounded-lg text-white transition-colors shadow-lg shadow-brand-500/10">
                      Purchase Success
                    </button>
                  </div>
                </div>

                <div>
                  <label class="block text-xs text-slate-400 font-semibold mb-2 uppercase">Custom Event Properties (JSON)</label>
                  <textarea
                    rows="5"
                    value={customProps}
                    onChange={(e) => setCustomProps(e.target.value)}
                    class="w-full bg-slate-950/80 border border-slate-800 rounded-lg px-3 py-2 text-xs font-mono text-white placeholder-slate-600 focus:outline-none focus:border-brand-500 transition-colors"
                  />
                </div>
              </div>
            </div>
          </div>

          {/* TELEMETRY STREAM VISUALIZER */}
          <div class="flex flex-col bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
            <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider mb-4">SDK Logger console output</h3>
            <div class="flex-1 bg-slate-950 rounded-lg border border-slate-800/80 p-4 font-mono text-xs text-slate-300 overflow-y-auto space-y-2.5 h-[340px]">
              {consoleLogs.length === 0 && (
                <div class="text-slate-600 italic">Click one of the event actions on the left to trigger the SDK telemetry loop. Logs will print here.</div>
              )}
              {consoleLogs.map((log, index) => (
                <div key={index} class={`pb-1.5 border-b border-slate-900/50 ${log.includes('[SDK Error]') ? 'text-accent-rose' : (log.includes('[Server response]') ? 'text-accent-emerald' : 'text-slate-300')}`}>
                  {log}
                </div>
              ))}
            </div>
            
            {apiResponse && (
              <div class="mt-4 p-4 rounded-lg bg-accent-emerald/5 border border-accent-emerald/20 text-xs font-mono text-slate-300">
                <span class="text-accent-emerald font-bold mb-1.5 block">POST /api/v1/track response:</span>
                {JSON.stringify(apiResponse, null, 2)}
              </div>
            )}
          </div>

        </div>
      );
    }

    function FunnelsView() {
      const [funnelData, setFunnelData] = useState(null);

      const chartInstance = useRef(null);

      const loadFunnel = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/analytics/funnels');
          if (res.ok) {
            const data = await res.json();
            setFunnelData(data);
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        loadFunnel();

    // MODULE 8: RETENTION COHORTS VIEW

    function RetentionView() {
      const [cohorts, setCohorts] = useState(null);
      const [loading, setLoading] = useState(true);

      const loadRetention = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/analytics/retention');
          if (res.ok) {
            const data = await res.json();
            setCohorts(data.cohorts);
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        loadRetention();
      }, []);

      // Return CSS opacity classes based on retention percentage
      const getHeatColorClass = (pct) => {
        if (pct === 100) return 'bg-slate-800 text-slate-300 border-slate-700';
        if (pct >= 50) return 'bg-brand-600/90 text-white border-brand-500';
        if (pct >= 30) return 'bg-brand-600/70 text-slate-100 border-brand-500/50';
        if (pct >= 15) return 'bg-brand-600/40 text-slate-300 border-brand-500/20';
        if (pct > 0) return 'bg-brand-600/20 text-slate-400 border-brand-500/10';
        return 'bg-slate-900 text-slate-600 border-slate-850';
      };

      if (loading || !cohorts) {
        return (
          <div class="h-96 flex items-center justify-center">
            <span class="w-10 h-10 rounded-full border-4 border-slate-800 border-t-brand-500 animate-spin"></span>
          </div>
        );
      }

      return (
        <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl overflow-hidden">
          <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
              <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Retention Cohort Matrix</h3>
              <p class="text-xs text-slate-400">Cohort retention tracking unique users returning over subsequent day intervals.</p>
            </div>
            <div class="flex gap-2">
              <span class="text-[10px] bg-brand-500/10 text-brand-100 border border-brand-500/20 px-2.5 py-1 rounded-lg">
                Type: Classic Retention
              </span>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full min-w-[700px] border-collapse text-xs">
              <thead>
                <tr class="border-b border-slate-800 text-slate-400 font-semibold uppercase text-[10px] text-left">
                  <th class="py-3 px-4">Cohort Date</th>
                  <th class="py-3 px-4">Cohort Size</th>
                  <th class="py-3 px-4 text-center">Day 0</th>
                  <th class="py-3 px-4 text-center">Day 1</th>
                  <th class="py-3 px-4 text-center">Day 7</th>
                  <th class="py-3 px-4 text-center">Day 14</th>
                  <th class="py-3 px-4 text-center">Day 30</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-850">
                {cohorts.map((row, index) => (
                  <tr key={row.cohort || index} class="hover:bg-slate-900/20 transition-colors">
                    <td class="py-3.5 px-4 font-semibold text-white">{row.cohort}</td>
                    <td class="py-3.5 px-4 text-slate-400">{row.size} users</td>
                    <td class={`py-3.5 px-2 text-center border-l border-slate-800/30 ${getHeatColorClass(row.rates.day_0)}`}>
                      {row.rates.day_0}%
                    </td>
                    <td class={`py-3.5 px-2 text-center border-l border-slate-800/30 ${getHeatColorClass(row.rates.day_1)}`}>
                      {row.rates.day_1}%
                    </td>
                    <td class={`py-3.5 px-2 text-center border-l border-slate-800/30 ${getHeatColorClass(row.rates.day_7)}`}>
                      {row.rates.day_7}%
                    </td>
                    <td class={`py-3.5 px-2 text-center border-l border-slate-800/30 ${getHeatColorClass(row.rates.day_14)}`}>
                      {row.rates.day_14}%
                    </td>
                    <td class={`py-3.5 px-2 text-center border-l border-slate-800/30 ${getHeatColorClass(row.rates.day_30)}`}>

    // ==========================================
    // MODULE 13 & 14: A/B TESTING & FEATURE FLAGS
    // ==========================================
    function ExperimentsView() {
      const [subTab, setSubTab] = useState('ab');

      // A/B states
      const [expStats, setExpStats] = useState(null);
      const [experiments, setExperiments] = useState([]);
      const [selectedExpId, setSelectedExpId] = useState('');
      const [loading, setLoading] = useState(true);
      const [isCreating, setIsCreating] = useState(false);
      const [newExpName, setNewExpName] = useState('');
      const [newMetric, setNewMetric] = useState('Purchase');
      const [trafficSplit, setTrafficSplit] = useState(50);
      const [controlFlag, setControlFlag] = useState('checkout-control');
      const [variationFlag, setVariationFlag] = useState('checkout-variation');
      const [hypothesis, setHypothesis] = useState('');

      // Flags states
      const [flags, setFlags] = useState([]);
      const [isCreatingFlag, setIsCreatingFlag] = useState(false);
      const [newFlagKey, setNewFlagKey] = useState('');
      const [newFlagDesc, setNewFlagDesc] = useState('');
      const [newFlagRollout, setNewFlagRollout] = useState(100);
      const [betaUsersInput, setBetaUsersInput] = useState({});

      const loadExperiments = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/experiments');
          if (res.ok) {
            const data = await res.json();
            const list = data.experiments || [];
            setExperiments(list);
            if (list.length > 0) {
              if (!selectedExpId) {
                setSelectedExpId(list[0].id);
              }
            } else {
              setLoading(false);
            }
          } else {
            setLoading(false);
          }
        } catch (e) {
          console.error(e);
          setLoading(false);
        }
      };

      const loadExpStats = async () => {
        if (!selectedExpId) return;
        setLoading(true);
        try {
          const res = await fetch(API_BASE + `/api/v1/experiments/results?experiment_id=${selectedExpId}`);
          if (res.ok) {
            const data = await res.json();
            setExpStats(data);
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      const loadFlags = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/flags');
          if (res.ok) {
            const data = await res.json();
            setFlags(data.flags || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      useEffect(() => {
        loadExperiments();
        loadFlags();
      }, []);

      useEffect(() => {
        if (selectedExpId) {
          loadExpStats();
        }
      }, [selectedExpId]);

      const handleSaveExperiment = async (e) => {
        e.preventDefault();
        if (!newExpName) return;

        try {
          const res = await fetch(API_BASE + '/api/v1/experiments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: newExpName,
              metric_name: newMetric,
              traffic_split: trafficSplit,
              control_flag_id: controlFlag,
              variation_flag_id: variationFlag,
              hypothesis_text: hypothesis
            })
          });
          if (res.ok) {
            const data = await res.json();
            setIsCreating(false);
            setNewExpName('');
            setHypothesis('');
            await loadExperiments();
            if (data.experiment_id) {
              setSelectedExpId(data.experiment_id);
            }
          }
        } catch (err) {
          console.error(err);
        }
      };

      const handleSaveFlag = async (e) => {
        e.preventDefault();
        if (!newFlagKey) return;

        try {
          const res = await fetch(API_BASE + '/api/v1/flags', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              key: newFlagKey,
              description: newFlagDesc,
              rollout_percentage: newFlagRollout,
              active: 1
            })
          });
          if (res.ok) {
            setIsCreatingFlag(false);
            setNewFlagKey('');
            setNewFlagDesc('');
            loadFlags();
          }
        } catch (err) {
          console.error(err);
        }
      };

      const handleToggleFlag = async (id, currentActive) => {
        try {
          const res = await fetch(API_BASE + `/api/v1/flags/${id}/toggle`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ active: !currentActive })
          });
          if (res.ok) {
            loadFlags();
          }
        } catch (err) {
          console.error(err);
        }
      };

      const handleRolloutChange = async (id, val) => {
        try {
          const res = await fetch(API_BASE + `/api/v1/flags/${id}/rollout`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rollout_percentage: val })
          });
          if (res.ok) {
            loadFlags();
          }
        } catch (err) {
          console.error(err);
        }
      };

      const handleSaveBetaUsers = async (id) => {
        const input = betaUsersInput[id] || '';
        const users = input.split(',').map(u => u.trim()).filter(Boolean);
        try {
          const res = await fetch(API_BASE + `/api/v1/flags/${id}/beta`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rules: users })
          });
          if (res.ok) {
            loadFlags();
          }
        } catch (err) {
          console.error(err);
        }
      };

      const standardMetrics = ['Page View', 'Signup', 'Login', 'Purchase', 'Checkout', 'Success', 'Errors'];

      return (
        <div class="space-y-6 animate-fade-up">
          {/* Sub tabs header */}
          <div class="flex border-b border-slate-800 pb-2 gap-4">
            <button
              onClick={() => setSubTab('ab')}
              class={`pb-2 px-1 text-xs font-bold transition-all relative ${
                subTab === 'ab' ? 'text-white border-b-2 border-brand-500' : 'text-slate-500 hover:text-white'
              }`}
            >
              A/B Experiments
            </button>
            <button
              onClick={() => setSubTab('flags')}
              class={`pb-2 px-1 text-xs font-bold transition-all relative ${
                subTab === 'flags' ? 'text-white border-b-2 border-brand-500' : 'text-slate-500 hover:text-white'
              }`}
            >
              Feature Flags Rollout
            </button>

    // ==========================================
    // MODULE 15: AI ENGINE / PREDICTOR VIEW
    // ==========================================
    function AIView() {
      const [query, setQuery] = useState('');
      const [chatHistory, setChatHistory] = useState([
        { sender: 'ai', text: 'InsightX AI Diagnostic Engine ready. Ask me why conversion dropped, or query user churn risks.' }
      ]);
      const [loadingChat, setLoadingChat] = useState(false);
      const [churnData, setChurnData] = useState([]);
      const [forecastData, setForecastData] = useState([]);
      const [insights, setInsights] = useState([]);
      const [clusteringData, setClusteringData] = useState([]);
      const [recommendations, setRecommendations] = useState([]);
      
      const forecastChartRef = useRef(null);
      const chartInstanceRef = useRef(null);

      const loadAI = async () => {
        try {
          // Churn
          const chRes = await fetch(API_BASE + '/api/v1/ai/predict-churn', { method: 'POST' });
          if (chRes.ok) {
            const data = await chRes.json();
            setChurnData(data.predictions);
          }
          // Forecast
          const fcRes = await fetch(API_BASE + '/api/v1/ai/forecast-revenue');
          if (fcRes.ok) {
            const data = await fcRes.json();
            setForecastData(data.full_series);
          }
          // Insights
          const insRes = await fetch(API_BASE + '/api/v1/ai/insights');
          if (insRes.ok) {
            const data = await insRes.json();
            setInsights(data.insights);
          }
          // User Clustering
          const clRes = await fetch(API_BASE + '/api/v1/ai/user-clustering');
          if (clRes.ok) {
            const data = await clRes.json();
            setClusteringData(data.clusters || []);
          }
          // Feature Recommendations
          const recRes = await fetch(API_BASE + '/api/v1/ai/feature-recommendation');
          if (recRes.ok) {
            const data = await recRes.json();
            setRecommendations(data.recommendations || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      useEffect(() => {
        loadAI();
      }, []);

      // Forecast chart builder
      useEffect(() => {
        if (forecastData.length === 0) return;
        if (chartInstanceRef.current) chartInstanceRef.current.destroy();

        if (forecastChartRef.current) {
          const ctx = forecastChartRef.current.getContext('2d');
          chartInstanceRef.current = new Chart(ctx, {
            type: 'line',
            data: {
              labels: forecastData.map(f => f.date.substring(5)),
              datasets: [
                {
                  label: 'Historical MRR',
                  data: forecastData.map(f => f.type === 'Historical' ? f.amount : null),
                  borderColor: '#6366f1',
                  backgroundColor: 'rgba(99, 102, 241, 0.05)',
                  fill: false,
                  tension: 0.1
                },
                {
                  label: 'AI Forecast',
                  data: forecastData.map((f, idx) => {
                    if (f.type === 'Forecast') return f.amount;
                    const next = forecastData[idx + 1];
                    if (next && next.type === 'Forecast') return f.amount;
                    return null;
                  }),
                  borderColor: '#06b6d4',
                  borderDash: [5, 5],
                  backgroundColor: 'rgba(6, 182, 212, 0.05)',
                  fill: false,
                  tension: 0.1
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { labels: { color: '#e2e8f0' } } },
              scales: {
                x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
                y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
              }
            }
          });
        }
        return () => {
          if (chartInstanceRef.current) chartInstanceRef.current.destroy();
        };
      }, [forecastData]);

      const handleQuerySubmit = async (e) => {
        e.preventDefault();
        if (!query.trim()) return;

        const userQ = query;
        setChatHistory(prev => [...prev, { sender: 'user', text: userQ }]);
        setQuery('');
        setLoadingChat(true);

        try {
          const res = await fetch(API_BASE + '/api/v1/ai/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: userQ })
          });
          const data = await res.json();
          if (res.ok) {
            setChatHistory(prev => [...prev, { sender: 'ai', text: data.answer }]);

        { time: 0, text: 'Session Ingestion Started' },

      ]);
      const [cursorPosition, setCursorPosition] = useState({ x: 50, y: 50 });
      const timerRef = useRef(null);

      // Simple mouse track player simulation
      useEffect(() => {
        if (!playing) {
          clearInterval(timerRef.current);
          return;
        }

        const path = [
          { x: 100, y: 120 }, { x: 220, y: 150 }, { x: 380, y: 250 },
          { x: 540, y: 180 }, { x: 620, y: 310 }, { x: 300, y: 240 },
          { x: 120, y: 380 }, { x: 440, y: 190 }, { x: 520, y: 110 }
        ];

        timerRef.current = setInterval(() => {
          setCurrentTime(old => {
            if (old >= 15) {
              setPlaying(false);
              return 15;
            }
            const nextVal = old + 1;
            // update cursor coordinate representation
            const coordIdx = nextVal % path.length;
            setCursorPosition(path[coordIdx]);
            return nextVal;
          });
        }, 1000);

        return () => clearInterval(timerRef.current);
      }, [playing]);

      const resetReplay = () => {
        setPlaying(false);
        setCurrentTime(0);
        setCursorPosition({ x: 50, y: 50 });
      };

    function ReportsView() {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(false);
      const [name, setName] = useState('');
      const [type, setType] = useState('Dashboard');
      const [format, setFormat] = useState('CSV');
      const [schedule, setSchedule] = useState('Daily');
      const [recipients, setRecipients] = useState('');
      const [isCreating, setIsCreating] = useState(false);
      const [actionStatus, setActionStatus] = useState('');

      const fetchReports = async () => {
        setLoading(true);
        try {
          const res = await fetch(API_BASE + '/api/v1/reports');
          if (res.ok) {
            const data = await res.json();
            setReports(data.reports || []);
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchReports();
      }, []);

      const handleCreate = async (e) => {
        e.preventDefault();
        if (!name) return;
        try {
          const res = await fetch(API_BASE + '/api/v1/reports', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name,
              type,
              format,
              schedule,
              email_recipients: recipients,
              project_id: 'proj-default'
            })
          });
          if (res.ok) {
            setName('');
            setRecipients('');
            setIsCreating(false);
            setActionStatus('Successfully scheduled report!');
            fetchReports();
            setTimeout(() => setActionStatus(''), 4000);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleSendNow = async (id) => {
        try {
          const res = await fetch(API_BASE + `/api/v1/reports/${id}/trigger`, {
            method: 'POST'
          });
          if (res.ok) {
            const data = await res.json();
            setActionStatus(data.message || 'Report generated and emailed successfully!');
            setTimeout(() => setActionStatus(''), 6000);
          }
        } catch (e) {
          setActionStatus('Failed to send report');
          setTimeout(() => setActionStatus(''), 4000);
        }
      };

      const handleDelete = async (id) => {
        try {
          const res = await fetch(API_BASE + `/api/v1/reports/${id}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            fetchReports();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleExport = (exportType, exportFormat) => {
        const url = `${API_BASE}/api/v1/reports/export?type=${exportType}&format=${exportFormat}`;
        window.open(url, '_blank');
      };

      return (

    // MODULE 17: NOTIFICATIONS / ALERTS VIEW
    // ==========================================
    function NotificationsView() {
      const [channels, setChannels] = useState([]);
      const [loading, setLoading] = useState(false);
      const [name, setName] = useState('');
      const [type, setType] = useState('Slack');
      const [webhookUrl, setWebhookUrl] = useState('');
      const [emailAddress, setEmailAddress] = useState('');
      const [isCreating, setIsCreating] = useState(false);
      const [actionStatus, setActionStatus] = useState('');

      const fetchChannels = async () => {
        setLoading(true);
        try {
          const res = await fetch(API_BASE + '/api/v1/alerts/channels');
          if (res.ok) {
            const data = await res.json();
            setChannels(data.channels || []);
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchChannels();
      }, []);

      const handleCreate = async (e) => {
        e.preventDefault();
        if (!name) return;
        try {
          const config = type === 'Email' ? { email_address: emailAddress } : { webhook_url: webhookUrl };
          const res = await fetch(API_BASE + '/api/v1/alerts/channels', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name,
              type,
              config,
              project_id: 'proj-default'
            })
          });
          if (res.ok) {
            setName('');
            setWebhookUrl('');
            setEmailAddress('');
            setIsCreating(false);
            setActionStatus('Alert notification channel registered!');
            fetchChannels();
            setTimeout(() => setActionStatus(''), 4000);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleTest = async (id) => {
        try {
          setActionStatus('Firing test notification payload...');
          const res = await fetch(API_BASE + `/api/v1/alerts/channels/${id}/test`, {
            method: 'POST'
          });
          if (res.ok) {
            const data = await res.json();
            setActionStatus(data.message + ' (' + (data.details || '') + ')');
            setTimeout(() => setActionStatus(''), 6000);
          }
        } catch (e) {
          setActionStatus('Failed to send test alert payload');
          setTimeout(() => setActionStatus(''), 4000);
        }
      };

      const handleDelete = async (id) => {
        try {
          const res = await fetch(API_BASE + `/api/v1/alerts/channels/${id}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            fetchChannels();
          }
        } catch (e) {
          console.error(e);
        }
      };

      return (
        <div class="space-y-6 animate-fade-up">
          {actionStatus && (
            <div class="p-3 bg-brand-500/10 border border-brand-500/25 rounded-lg text-xs font-semibold text-brand-300 animate-pulse">
              {actionStatus}
            </div>
          )}

          <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
            <div class="flex justify-between items-center mb-6">
              <div>
                <h3 class="text-base font-bold text-white">Alert Outbound Channels</h3>
                <p class="text-xs text-slate-400 mt-0.5">Integrate Slack, Teams, Discord, Webhooks or Email to receive real-time anomaly indicators.</p>
              </div>
              <button
                onClick={() => setIsCreating(!isCreating)}
                class="bg-brand-500 hover:bg-brand-600 text-white text-xs font-semibold py-1.5 px-3.5 rounded-lg transition-colors"
              >
                {isCreating ? 'Cancel' : 'Configure Integration Channel'}
              </button>
            </div>

            {isCreating && (
              <form onSubmit={handleCreate} class="bg-slate-950 border border-slate-850 p-6 rounded-xl space-y-4 mb-6">
                <h4 class="font-bold text-xs text-slate-300 uppercase tracking-wider">New Notification Integration</h4>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Channel Friendly Name</label>
                    <input
                      type="text"
                      required
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                      placeholder="E.g. #marketing-alerts Slack..."
                      class="w-full bg-slate-900 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none"
                    />
                  </div>

                  <div>
                    <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Integration Service Type</label>
                    <select
                      value={type}
                      onChange={(e) => setType(e.target.value)}
                      class="w-full bg-slate-900 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-300 focus:outline-none"
                    >
                      <option value="Slack">Slack Webhook</option>
                      <option value="Discord">Discord Webhook</option>
                      <option value="Teams">Microsoft Teams Webhook</option>
                      <option value="Webhook">Custom HTTP Post Webhook</option>
                      <option value="Email">Email Alert</option>
                    </select>
                  </div>

                  {type === 'Email' ? (
                    <div>
                      <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Target Email Address</label>
                      <input
                        type="email"
                        required
                        value={emailAddress}
                        onChange={(e) => setEmailAddress(e.target.value)}
                        placeholder="E.g. alerts@acme.com"
                        class="w-full bg-slate-900 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none"
                      />
                    </div>
                  ) : (
                    <div>
                      <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Webhook URL Endpoint</label>
                      <input
                        type="url"
                        required
                        value={webhookUrl}
                        onChange={(e) => setWebhookUrl(e.target.value)}
                        placeholder="https://hooks.slack.com/services/..."
                        class="w-full bg-slate-900 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none"
                      />
                    </div>
                  )}
                </div>

                <button type="submit" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-2 rounded text-xs transition-colors">
                  Activate Integration Channel
                </button>
              </form>
            )}

            {loading ? (
              <div class="h-24 flex items-center justify-center">
                <span class="w-6 h-6 rounded-full border-4 border-slate-800 border-t-brand-500 animate-spin"></span>
              </div>
            ) : (
              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                  <thead>
                    <tr class="border-b border-slate-800 text-slate-500 uppercase text-[9px] font-bold">
                      <th class="py-2.5 px-3">Channel Name</th>
                      <th class="py-2.5 px-3">Service</th>
                      <th class="py-2.5 px-3">Config endpoint</th>
                      <th class="py-2.5 px-3 text-center">Status</th>
                      <th class="py-2.5 px-3 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-850/60">
                    {channels.map((chan) => {
                      const config = JSON.parse(chan.config || '{}');
                      const target = chan.type === 'Email' ? config.email_address : config.webhook_url;
                      const isOnline = chan.active === 1;

                      return (
                        <tr key={chan.id} class="hover:bg-slate-900/10">
                          <td class="py-3 px-3 font-semibold text-white">{chan.name}</td>
                          <td class="py-3 px-3 text-slate-400">
                            <span class={`px-2 py-0.5 rounded text-[10px] font-bold ${
                              chan.type === 'Slack' ? 'bg-accent-violet/10 text-accent-violet' :
                              chan.type === 'Discord' ? 'bg-brand-500/10 text-brand-400' :
                              chan.type === 'Webhook' ? 'bg-accent-cyan/10 text-accent-cyan' : 'bg-slate-800 text-slate-400'
                            }`}>
                              {chan.type}
                            </span>
                          </td>
                          <td class="py-3 px-3 text-slate-400 truncate max-w-xs font-mono text-[10px]">{target}</td>
                          <td class="py-3 px-3 text-center">
                            <span class="flex items-center justify-center gap-1.5">
                              <span class={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-accent-emerald' : 'bg-slate-550'}`}></span>
                              <span class="text-[10px] text-slate-550 font-bold">{isOnline ? 'Active' : 'Muted'}</span>
                            </span>
                          </td>
                          <td class="py-3 px-3 text-right space-x-2 shrink-0">
                            <button
                              onClick={() => handleTest(chan.id)}
                              class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-[10px] font-bold px-2.5 py-1 rounded text-brand-400 transition-colors"
                            >
                              Fire Test payload
                            </button>
                            <button
                              onClick={() => handleDelete(chan.id)}
                              class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-[10px] font-bold px-2 py-1 rounded text-accent-rose transition-colors"
                            >
                              Disconnect
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                    {channels.length === 0 && (
                      <tr>
                        <td colSpan="5" class="text-center py-6 text-slate-500 italic">No alert notification channels configured yet.</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // MODULE 19 & 20: SETTINGS & BILLING VIEW
    // ==========================================
    function SettingsView({ apiKey }) {
      const [billingPlan, setBillingPlan] = useState('Free');
      const [invoices, setInvoices] = useState([]);
      const [orgs, setOrgs] = useState([]);
      const [selectedOrgId, setSelectedOrgId] = useState('');
      const [orgName, setOrgName] = useState('');
      const [projectName, setProjectName] = useState('');
      const [inviteEmail, setInviteEmail] = useState('');
      const [inviteRole, setInviteRole] = useState('Viewer');
      const [members, setMembers] = useState([]);
      const [pendingInvites, setPendingInvites] = useState([]);
      const [mfaEnabled, setMfaEnabled] = useState(false);
      const [mfaSecret, setMfaSecret] = useState('');

      const fetchOrgs = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/organizations');
          if (res.ok) {
            const data = await res.json();
            setOrgs(data.organizations || []);
            if (data.organizations && data.organizations.length > 0) {
              const firstOrg = data.organizations[0];
              setSelectedOrgId(firstOrg.id);
              setBillingPlan(firstOrg.billing_plan || 'Free');
            }
          }
        } catch (e) {
          console.error(e);
        }
      };

      const fetchInvoices = async () => {
        if (!selectedOrgId) return;
        try {
          const res = await fetch(API_BASE + `/api/v1/organizations/${selectedOrgId}/invoices`);
          if (res.ok) {
            const data = await res.json();
            setInvoices(data.invoices || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const fetchMembers = async () => {
        if (!selectedOrgId) return;
        try {
          const res = await fetch(API_BASE + `/api/v1/organizations/members?organization_id=${selectedOrgId}`);
          if (res.ok) {
            const data = await res.json();
            setMembers(data.members || []);
            setPendingInvites(data.pending_invites || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      useEffect(() => {
        fetchOrgs();
      }, []);

      useEffect(() => {
        if (selectedOrgId) {
          fetchInvoices();
          fetchMembers();
        }
      }, [selectedOrgId]);

      const handleUpgradePlan = async (plan) => {
        if (!selectedOrgId) return;
        try {
          const res = await fetch(API_BASE + `/api/v1/organizations/${selectedOrgId}/billing`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ billing_plan: plan })
          });
          if (res.ok) {
            setBillingPlan(plan);
            fetchInvoices();
            alert(`Workspace subscription level updated to ${plan} Plan!`);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleCreateOrg = async (e) => {
        e.preventDefault();
        if (!orgName) return;
        try {
          const res = await fetch(API_BASE + '/api/v1/organizations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: orgName })
          });
          if (res.ok) {
            setOrgName('');
            fetchOrgs();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleCreateProject = async (e) => {
        e.preventDefault();
        if (!projectName || !selectedOrgId) return;
        try {
          const res = await fetch(API_BASE + '/api/v1/projects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: projectName, organization_id: selectedOrgId })
          });
          if (res.ok) {
            const data = await res.json();
            setProjectName('');
            alert(`Project key generated successfully: ${data.project.api_key}`);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleInvite = async (e) => {
        e.preventDefault();
        if (!inviteEmail || !selectedOrgId) return;
        try {
          const res = await fetch(API_BASE + '/api/v1/organizations/invite', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ organization_id: selectedOrgId, email: inviteEmail, role: inviteRole })
          });
          if (res.ok) {
            setInviteEmail('');
            fetchMembers();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleMfaToggle = async () => {
        try {
          if (mfaEnabled) {
            const res = await fetch(API_BASE + '/api/v1/auth/mfa/disable', { method: 'POST' });
            if (res.ok) {
              setMfaEnabled(false);
              setMfaSecret('');
            }
          } else {
            const res = await fetch(API_BASE + '/api/v1/auth/mfa/enable', { method: 'POST' });
            if (res.ok) {
              const data = await res.json();
              setMfaEnabled(true);
              setMfaSecret(data.mfa_secret);
            }
          }
        } catch (e) {}
      };

      const getUsageLimit = () => {
        if (billingPlan === 'Free') return 10000;
        if (billingPlan === 'Pro') return 500000;
        return 'Unlimited';
      };
      const limit = getUsageLimit();
      const currentUsage = 4232;
      const usagePercentage = typeof limit === 'number' ? Math.min(100, (currentUsage / limit) * 100) : 0;

        <div class="space-y-8 animate-fade-up">

              <form onSubmit={handleCreateOrg} class="flex gap-2">

                  class="flex-1 bg-slate-950 border border-slate-850 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-brand-500"
                />
                <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white text-xs px-4 py-1.5 rounded-lg font-semibold shrink-0 transition-colors">
                  Create
                </button>
              </form>

              <div class="space-y-2 max-h-36 overflow-y-auto">
                {orgs.map((o) => (
                  <button
                    key={o.id}
                    onClick={() => { setSelectedOrgId(o.id); setBillingPlan(o.billing_plan || 'Free'); }}
                    class={`w-full flex justify-between items-center p-3 rounded-lg text-xs transition-all ${
                      selectedOrgId === o.id ? 'bg-brand-500/10 border border-brand-500/30' : 'bg-slate-950 border border-slate-900'
                    }`}
                  >
                    <span class="text-white font-semibold">{o.name}</span>
                    <span class="text-[10px] text-slate-500 font-mono">{o.id}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Plan selector quotas and progress */}
            <div class="lg:col-span-2 bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl space-y-6">
              <div class="flex justify-between items-center">
                <div>
                  <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Billing Tiers & Quotas</h3>
                  <p class="text-xs text-slate-400 mt-0.5">Manage subscription limits and usage indices.</p>
                </div>
                <strong class="text-white bg-brand-500/10 px-3 py-1 rounded text-xs uppercase font-bold text-brand-400 border border-brand-500/20">{billingPlan} Plan</strong>
              </div>

              {/* Ingestion usage tracking */}
              <div class="p-4 bg-slate-955 rounded-lg border border-slate-850 space-y-2">
                <div class="flex justify-between text-xs font-semibold text-slate-300">
                  <span>Event Ingestion Usage</span>
                  <span>{currentUsage.toLocaleString()} / {typeof limit === 'number' ? limit.toLocaleString() : 'Unlimited'} events</span>
                </div>
                <div class="w-full bg-slate-900 rounded-full h-2 border border-slate-800 overflow-hidden">
                  <div
                    class="bg-brand-500 h-full rounded-full transition-all duration-500"
                    style={{ width: `${typeof limit === 'number' ? usagePercentage : 0}%` }}
                  ></div>
                </div>
                <span class="block text-[10px] text-slate-500">{typeof limit === 'number' ? `Usage resetting in 26 days. (${usagePercentage.toFixed(1)}% consumed)` : 'Unlimited ingestion active.'}</span>
              </div>

              {/* Pricing Cards */}
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class={`p-4 rounded-lg border flex flex-col justify-between ${billingPlan === 'Free' ? 'border-brand-500/40 bg-brand-500/5' : 'border-slate-850 bg-slate-955/40'}`}>
                  <div>
                    <h4 class="font-bold text-xs text-white">Free Plan</h4>
                    <p class="text-[10px] text-slate-500 mt-1">Up to 10k events/mo. Core metrics and standard funnels calculations.</p>
                  </div>
                  <button
                    disabled={billingPlan === 'Free'}
                    onClick={() => handleUpgradePlan('Free')}
                    class="mt-4 w-full bg-slate-900 hover:bg-slate-850 text-slate-300 text-[10px] py-1.5 rounded font-bold transition-all border border-slate-800 disabled:opacity-50"
                  >
                    {billingPlan === 'Free' ? 'Active' : 'Downgrade'}
                  </button>
                </div>

                <div class={`p-4 rounded-lg border flex flex-col justify-between ${billingPlan === 'Pro' ? 'border-brand-500/40 bg-brand-500/5' : 'border-slate-850 bg-slate-955/40'}`}>
                  <div>
                    <h4 class="font-bold text-xs text-white">Pro Plan ($99/mo)</h4>
                    <p class="text-[10px] text-slate-500 mt-1">Up to 500k events/mo. A/B testing splits and scheduled report automations.</p>
                  </div>
                  <button
                    disabled={billingPlan === 'Pro'}
                    onClick={() => handleUpgradePlan('Pro')}
                    class="mt-4 w-full bg-brand-500 hover:bg-brand-600 text-white text-[10px] py-1.5 rounded font-bold transition-all disabled:opacity-50"
                  >
                    {billingPlan === 'Pro' ? 'Active' : 'Upgrade to Pro'}
                  </button>
                </div>

                <div class={`p-4 rounded-lg border flex flex-col justify-between ${billingPlan === 'Enterprise' ? 'border-brand-500/40 bg-brand-500/5' : 'border-slate-850 bg-slate-955/40'}`}>
                  <div>
                    <h4 class="font-bold text-xs text-white">Enterprise</h4>
                    <p class="text-[10px] text-slate-500 mt-1">Unlimited ingestion. Dedicated AI clusters and live Teams/Slack outbound hooks.</p>
                  </div>
                  <button
                    disabled={billingPlan === 'Enterprise'}
                    onClick={() => handleUpgradePlan('Enterprise')}
                    class="mt-4 w-full bg-slate-900 hover:bg-slate-850 text-slate-300 text-[10px] py-1.5 rounded font-bold transition-all border border-slate-800 disabled:opacity-50"
                  >
                    {billingPlan === 'Enterprise' ? 'Active' : 'Upgrade Enterprise'}
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* Invoices list and active key */}
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl space-y-4">
              <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Workspace Projects</h3>
              <p class="text-xs text-slate-400">Manage telemetry api tokens for direct client integration.</p>
              
              <form onSubmit={handleCreateProject} class="flex gap-2">
                <input
                  type="text"
                  value={projectName}
                  onChange={(e) => setProjectName(e.target.value)}
                  placeholder="Mobile iOS app..."
                  class="flex-1 bg-slate-950 border border-slate-850 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none"
                />
                <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white text-xs px-3 py-1.5 rounded font-semibold shrink-0 transition-colors">
                  Create
                </button>
              </form>

              <div class="p-4 rounded-lg bg-slate-955 border border-slate-850">
                <strong class="text-slate-500 block text-[10px] uppercase font-bold tracking-wider">Active Telemetry API Key:</strong>
                <span class="text-white font-mono block mt-1.5 break-all bg-slate-900 px-3 py-1.5 rounded text-xs select-all">{apiKey}</span>

            <div class="lg:col-span-2 bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl space-y-4">
              <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Invoices & Statements</h3>
              
              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">

                    <tr class="border-b border-slate-800 text-slate-500 uppercase text-[9px] font-bold">

                      <th class="py-2.5 px-3">Billing Date</th>

                      <th class="py-2.5 px-3 text-center">Plan Tier</th>
                      <th class="py-2.5 px-3 text-center">Status</th>
                      <th class="py-2.5 px-3 text-right">Download</th>

                  <tbody class="divide-y divide-slate-850/60">
                    {invoices.map((inv) => (
                      <tr key={inv.id} class="hover:bg-slate-900/10">
                        <td class="py-3 px-3 font-semibold text-white">{inv.id}</td>
                        <td class="py-3 px-3 text-slate-400">{inv.date}</td>

                            {inv.status}

                        </td>
                        <td class="py-3 px-3 text-right">
                          <button
                            onClick={() => alert(`Simulated downloading invoice ${inv.id}.pdf successfully.`)}
                            class="text-brand-400 hover:text-brand-355 font-bold text-[10px]"

                            PDF Statement
                          </button>

                      </tr>
                    ))}
                    {invoices.length === 0 && (
                      <tr>
                        <td colSpan="6" class="text-center py-6 text-slate-500 italic">No invoicing statements registered.</td>

              </div>
            </div>
          </div>

          {/* Invites & Members */}
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl space-y-4">
              <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Invite Team Members</h3>
              <form onSubmit={handleInvite} class="space-y-3">
                <div>
                  <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Email Address</label>
                  <input
                    type="email"
                    required
                    value={inviteEmail}
                    onChange={(e) => setInviteEmail(e.target.value)}
                    placeholder="colleague@insightx.ai"
                    class="w-full bg-slate-950 border border-slate-850 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none"
                  />
                </div>
                <div>
                  <label class="block text-[10px] text-slate-500 font-bold mb-1 uppercase">Workspace Role</label>
                  <select
                    value={inviteRole}
                    onChange={(e) => setInviteRole(e.target.value)}
                    class="w-full bg-slate-950 border border-slate-850 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none"
                  >
                    <option value="Administrator">Administrator (Write configs & Billing)</option>
