                      <span class="text-[10px] text-slate-550 block">{m.email}</span>
                    </div>
                    <span class="text-[10px] bg-slate-850 border border-slate-800 text-slate-400 px-2 py-0.5 rounded font-medium">{m.role}</span>
                  </div>
                ))}
                {pendingInvites.map((pi, idx) => (
                  <div key={idx} class="flex justify-between items-center p-3 rounded-lg bg-slate-950/20 border border-slate-855/50 text-xs border-dashed">
                    <div>
                      <span class="text-slate-400 block font-semibold">{pi.email}</span>
                      <span class="text-[10px] text-slate-550 block">Pending verification link</span>
                    </div>
                    <span class="text-[10px] bg-accent-rose/10 text-accent-rose px-2 py-0.5 rounded font-medium">Pending</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* MFA Profile */}
          <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl space-y-4">
            <h3 class="font-bold text-sm text-slate-300 uppercase tracking-wider">Security & MFA Profile</h3>
            <div class="pt-2 flex justify-between items-center text-xs">
              <div>
                <strong class="text-white block font-medium">Multi-Factor Authentication (MFA)</strong>
                <span class="text-slate-550 text-[10px]">Require 6-digit OTP code on user login sessions.</span>
              </div>
              <button
                onClick={handleMfaToggle}
                class={`font-semibold py-1.5 px-3 rounded-lg text-xs transition-colors ${
                  mfaEnabled ? 'bg-accent-rose hover:bg-accent-rose/85 text-white' : 'bg-slate-800 hover:bg-slate-700 text-white'
                }`}
              >
                {mfaEnabled ? 'Disable MFA' : 'Enable MFA'}
              </button>
            </div>
            {mfaEnabled && mfaSecret && (
              <div class="p-4 bg-slate-950 rounded-lg border border-slate-850 font-mono text-xs text-slate-300">
                <span class="text-accent-cyan font-bold block mb-1">MFA Secret Seed:</span>
                <span>{mfaSecret}</span>
                <span class="block mt-2 text-[10px] text-slate-500 font-sans">Configure your authenticator app with this secret to generate OTPs. Use code 123456 to log in next time.</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // MODULE 19: ADMIN PANEL VIEW
    // ==========================================
    function AdminConsoleView() {
      const [activeSubTab, setActiveSubTab] = useState('users'); // 'users', 'projects', 'logs'
      const [users, setUsers] = useState([]);
      const [projects, setProjects] = useState([]);
      const [logs, setLogs] = useState([]);

      const fetchUsers = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/admin/users');
          if (res.ok) {
            const data = await res.json();
            setUsers(data.users || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const fetchProjects = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/admin/projects');
          if (res.ok) {
            const data = await res.json();
            setProjects(data.projects || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      const fetchLogs = async () => {
        try {
          const res = await fetch(API_BASE + '/api/v1/admin/logs');
          if (res.ok) {
            const data = await res.json();
            setLogs(data.logs || []);
          }
        } catch (e) {
          console.error(e);
        }
      };

      useEffect(() => {
        if (activeSubTab === 'users') fetchUsers();
        if (activeSubTab === 'projects') fetchProjects();
        if (activeSubTab === 'logs') fetchLogs();
      }, [activeSubTab]);

      const handleRoleChange = async (userId, currentRole) => {
        const nextRole = currentRole === 'Administrator' ? 'Editor' : currentRole === 'Editor' ? 'Viewer' : 'Administrator';
        try {
          const res = await fetch(API_BASE + `/api/v1/admin/users/${userId}/role`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: nextRole })
          });
          if (res.ok) {
            fetchUsers();
          }
        } catch (e) {
          console.error(e);
        }
      };

      return (
        <div class="space-y-6 animate-fade-up">
          {/* Sub tabs selector */}
          <div class="flex gap-2.5 border-b border-slate-900 pb-3">
            <button
              onClick={() => setActiveSubTab('users')}
              class={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                activeSubTab === 'users' ? 'bg-brand-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'
              }`}
            >
              Users & Permissions
            </button>
            <button
              onClick={() => setActiveSubTab('projects')}
              class={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                activeSubTab === 'projects' ? 'bg-brand-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'
              }`}
            >
              Workspace Projects
            </button>
            <button
              onClick={() => setActiveSubTab('logs')}
              class={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                activeSubTab === 'logs' ? 'bg-brand-500 text-white shadow-lg' : 'text-slate-400 hover:text-white'
              }`}
            >
              System Audit Trail
            </button>
          </div>

          {activeSubTab === 'users' && (
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
              <div class="flex justify-between items-center mb-6">
                <div>
                  <h3 class="text-base font-bold text-white">Users Directory & Permissions</h3>
                  <p class="text-xs text-slate-400 mt-0.5">List registered accounts, verify MFA status and allocate access permissions.</p>
                </div>
              </div>

              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                  <thead>
                    <tr class="border-b border-slate-800 text-slate-500 uppercase text-[9px] font-bold">
                      <th class="py-2.5 px-3">User Name</th>
                      <th class="py-2.5 px-3">Email Address</th>
                      <th class="py-2.5 px-3 text-center">MFA Active</th>
                      <th class="py-2.5 px-3 text-center">Status</th>
                      <th class="py-2.5 px-3 text-center">Assigned Role</th>
                      <th class="py-2.5 px-3 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-850/60 text-slate-300">
                    {users.map((u) => (
                      <tr key={u.id} class="hover:bg-slate-900/10">
                        <td class="py-3 px-3 font-semibold text-white">{u.full_name || 'N/A'}</td>
                        <td class="py-3 px-3 font-mono text-[11px] text-slate-400">{u.email}</td>
                        <td class="py-3 px-3 text-center">
                          <span class={`inline-block text-[9px] px-2 py-0.5 rounded font-bold ${
                            u.mfa_enabled === 1 ? 'bg-accent-violet/10 text-accent-violet border border-accent-violet/20' : 'bg-slate-800 text-slate-500'
                          }`}>
                            {u.mfa_enabled === 1 ? 'OTP Enabled' : 'Disabled'}
                          </span>
                        </td>
                        <td class="py-3 px-3 text-center">
                          <span class={`inline-block text-[9px] px-2 py-0.5 rounded font-bold ${
                            u.verified === 1 ? 'bg-accent-emerald/10 text-accent-emerald' : 'bg-slate-800 text-slate-550'
                          }`}>
                            {u.verified === 1 ? 'Verified' : 'Pending'}
                          </span>
                        </td>
                        <td class="py-3 px-3 text-center">
                          <span class="bg-slate-800 border border-slate-700 text-slate-300 text-[10px] px-2 py-0.5 rounded">
                            {u.role}
                          </span>
                        </td>
                        <td class="py-3 px-3 text-right">
                          <button
                            onClick={() => handleRoleChange(u.id, u.role)}
                            class="bg-slate-950 hover:bg-slate-900 border border-slate-850 text-slate-300 text-[10px] px-2.5 py-1 rounded transition-colors"
                          >
                            Cycle Permission Role
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeSubTab === 'projects' && (
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
              <div class="mb-6">
                <h3 class="text-base font-bold text-white">Workspace Projects & Tokens</h3>
                <p class="text-xs text-slate-400 mt-0.5">Audit generated project segments and API tokens mapped to telemetry streams.</p>
              </div>

              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                  <thead>
                    <tr class="border-b border-slate-800 text-slate-500 uppercase text-[9px] font-bold">
                      <th class="py-2.5 px-3">Project Title</th>
                      <th class="py-2.5 px-3">Unique Project ID</th>
                      <th class="py-2.5 px-3">API Telemetry Credentials Key</th>
                      <th class="py-2.5 px-3 text-right">Stream Status</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-850/60 text-slate-300 font-mono text-[11px]">
                    {projects.map((p) => (
                      <tr key={p.id} class="hover:bg-slate-900/10">
                        <td class="py-3 px-3 font-semibold text-white font-sans text-xs">{p.name}</td>
                        <td class="py-3 px-3 text-slate-400">{p.id}</td>
                        <td class="py-3 px-3 text-brand-300 break-all select-all">{p.api_key}</td>
                        <td class="py-3 px-3 text-right text-accent-emerald font-bold font-sans text-[10px]">Capturing</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeSubTab === 'logs' && (
            <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-6 shadow-xl">
              <div class="mb-6">
                <h3 class="text-base font-bold text-white">Workspace Audit Trail Log</h3>
                <p class="text-xs text-slate-400 mt-0.5">Real-time log tracing of billing mutations, database configurations, and permission cycles.</p>
              </div>

              <div class="overflow-x-auto max-h-[350px] overflow-y-auto pr-2">
                <table class="w-full text-left text-xs border-collapse">
                  <thead>
                    <tr class="border-b border-slate-800 text-slate-500 uppercase text-[9px] font-bold sticky top-0 bg-slate-900/90 py-2">
                      <th class="py-2 px-3">Timestamp (UTC)</th>
                      <th class="py-2 px-3">Action Type</th>
                      <th class="py-2 px-3">Actor Email</th>
                      <th class="py-2 px-3">Log Details</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-850/60 text-slate-300 font-mono text-[10px]">
                    {logs.map((l) => (
                      <tr key={l.id} class="hover:bg-slate-900/10">
                        <td class="py-2.5 px-3 text-slate-500">{new Date(l.timestamp).toLocaleString()}</td>
                        <td class="py-2.5 px-3">
                          <span class="bg-slate-850 text-slate-300 border border-slate-800 px-1.5 py-0.5 rounded font-semibold text-[9px]">
                            {l.action}
                          </span>
                        </td>
                        <td class="py-2.5 px-3 text-slate-400 font-sans text-xs">{l.user_email}</td>
                        <td class="py-2.5 px-3 text-brand-100 font-sans text-xs">{l.details}</td>
                      </tr>
                    ))}
                    {logs.length === 0 && (
                      <tr>
                        <td colSpan="4" class="text-center py-6 text-slate-500 italic">No system audit events recorded.</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // PM PORTFOLIO VIEW (BRD, PRD, Strategy, Roadmap, etc.)
    // ==========================================
    function PortfolioView({ selectedDoc, setSelectedDoc }) {
      const [docText, setDocText] = useState('Loading document...');
      const [loading, setLoading] = useState(true);
      const fetchDocText = async (docName) => {
        setLoading(true);
        try {
          const pathMap = {
            BRD: '/docs/BRD.md',
            PRD: '/docs/PRD.md',
            Strategy: '/docs/VISION_STRATEGY.md',
            Roadmap: '/docs/ROADMAP.md',
            Personas: '/docs/PERSONAS_JOURNEYS.md',
            Metrics: '/docs/METRICS.md',
            UserStories: '/docs/USER_STORIES.md',
            GTM: '/docs/GTM_STRATEGY.md',
          };
          const res = await fetch(API_BASE + pathMap[docName]);
          if (res.ok) {
            const txt = await res.text();
            setDocText(txt);
          } else {
            setDocText(`Failed to load ${docName} from public/docs/ location.`);
          }
        } catch (e) {
          setDocText(`Error loading file: Make sure file has been saved in public docs directory.`);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchDocText(selectedDoc);
      }, [selectedDoc]);

      return (
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
          
          {/* Docs selection navigation */}
          <div class="bg-slate-900/40 border border-slate-800 rounded-xl p-4 shadow-xl h-fit">
            <h3 class="font-bold text-xs text-slate-500 uppercase tracking-widest mb-4 px-2">Portfolio Index</h3>
            
            <div class="space-y-1">
              <DocNavItem label="Business Requirements (BRD)" name="BRD" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="Product Requirements (PRD)" name="PRD" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="Product Vision & Strategy" name="Strategy" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="Roadmap & OKRs" name="Roadmap" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="User Personas & Journeys" name="Personas" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="Metrics Framework & Statistics" name="Metrics" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="User Stories & Backlog" name="UserStories" selected={selectedDoc} onClick={setSelectedDoc} />
              <DocNavItem label="GTM Strategy & Presentation" name="GTM" selected={selectedDoc} onClick={setSelectedDoc} />
            </div>
          </div>

          {/* Docs markdown reader */}
          <div class="lg:col-span-3 bg-slate-900/40 border border-slate-800 rounded-xl p-8 shadow-xl">
            {loading ? (
              <div class="h-96 flex items-center justify-center">
                <span class="w-8 h-8 rounded-full border-4 border-slate-800 border-t-brand-500 animate-spin"></span>
              </div>
            ) : (
              <div class="prose prose-invert max-w-none text-slate-300 text-sm leading-relaxed space-y-4">
                <div class="flex items-center justify-between pb-4 border-b border-slate-800 mb-6">
                  <span class="text-xs text-slate-400 font-bold uppercase tracking-widest bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-850">
                    File: docs/{selectedDoc}.md
                  </span>
                  <a href={`/docs/${selectedDoc === 'Strategy' ? 'VISION_STRATEGY' : (selectedDoc === 'Roadmap' ? 'ROADMAP' : (selectedDoc === 'Personas' ? 'PERSONAS_JOURNEYS' : (selectedDoc === 'Metrics' ? 'METRICS' : (selectedDoc === 'UserStories' ? 'USER_STORIES' : (selectedDoc === 'GTM' ? 'GTM_STRATEGY' : selectedDoc)))))}.md`} download class="text-xs text-brand-400 hover:underline">
                    Download Raw MD
                  </a>
                </div>
                
                {/* Preformatted text with line breaks for markdown rendering */}
                <pre class="bg-transparent text-slate-300 font-sans whitespace-pre-wrap select-text p-0 border-0 leading-relaxed max-h-[500px] overflow-y-auto pr-3">
                  {docText}
                </pre>
              </div>
            )}
          </div>

        </div>
      );
    }

    function DocNavItem({ label, name, selected, onClick }) {
      const isSelected = selected === name;
      return (
        <button
          onClick={() => onClick(name)}
          class={`w-full text-left px-3 py-2 rounded-lg text-xs font-semibold transition-all ${
            isSelected
              ? 'bg-brand-600/20 border border-brand-500/35 text-white'
              : 'text-slate-450 hover:text-slate-200 hover:bg-slate-850/60'
          }`}
        >
          {label}
        </button>
      );
    }

    // Mount react elements to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
